<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Project Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;font-size:14px;line-height:1.6}
.page{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
h1{font-size:22px;font-weight:500;color:#1a1a18;margin-bottom:0.25rem}
.subtitle{font-size:13px;color:#888780;margin-bottom:2rem}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:2rem}
.metric{background:#fff;border:0.5px solid #d3d1c7;border-radius:10px;padding:0.9rem 1rem}
.metric-label{font-size:11px;color:#888780;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em}
.metric-val{font-size:22px;font-weight:500}
.mv-total{color:#1a1a18}.mv-on{color:#3B6D11}.mv-risk{color:#854F0B}.mv-blocked{color:#A32D2D}.mv-done{color:#185FA5}

/* Section */
.section{background:#fff;border:0.5px solid #d3d1c7;border-radius:12px;overflow:hidden;margin-bottom:1.5rem}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:0.5px solid #d3d1c7;flex-wrap:wrap;gap:8px}
.section-title{font-size:15px;font-weight:500;color:#1a1a18}
.filters{display:flex;gap:8px;flex-wrap:wrap}

/* Table */
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{padding:9px 12px;text-align:left;font-size:11px;font-weight:500;color:#888780;text-transform:uppercase;letter-spacing:0.04em;border-bottom:0.5px solid #d3d1c7;background:#f9f8f5}
td{padding:10px 12px;border-bottom:0.5px solid #eeecea;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1a1a18}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9f8f5}
.col-dept{width:16%}.col-proj{width:22%}.col-own{width:13%}.col-stat{width:13%}.col-pri{width:10%}.col-prog{width:16%}.col-act{width:10%}

/* Badges */
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.b-green{background:#EAF3DE;color:#3B6D11}
.b-amber{background:#FAEEDA;color:#854F0B}
.b-red{background:#FCEBEB;color:#A32D2D}
.b-blue{background:#E6F1FB;color:#185FA5}
.b-gray{background:#F1EFE8;color:#5F5E5A}

/* Progress */
.prog-wrap{width:100%;background:#f1efe8;border-radius:20px;height:6px}
.prog-bar{height:6px;border-radius:20px;min-width:4px}

/* Add row */
.add-area{padding:1rem 1.25rem;border-top:0.5px solid #d3d1c7;background:#f9f8f5;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
input,select{font-size:13px;padding:6px 10px;border-radius:8px;border:0.5px solid #d3d1c7;background:#fff;color:#1a1a18;font-family:inherit}
input:focus,select:focus{outline:none;border-color:#888780}
.btn{background:#fff;border:0.5px solid #d3d1c7;color:#1a1a18;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;white-space:nowrap}
.btn:hover{background:#f1efe8}
.btn-primary{background:#1a1a18;color:#fff;border-color:#1a1a18}
.btn-primary:hover{background:#2c2c2a}
.del-btn{background:none;border:none;cursor:pointer;color:#b4b2a9;font-size:15px;padding:2px 6px;font-family:inherit}
.del-btn:hover{color:#A32D2D}

/* Tasks section */
.tasks-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
@media(max-width:680px){.tasks-grid{grid-template-columns:1fr}}
.tasks-col{padding:1.25rem}
.tasks-col:first-child{border-right:0.5px solid #d3d1c7}
.tasks-col-title{font-size:12px;font-weight:500;color:#888780;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:1rem}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid #eeecea}
.task-item:last-child{border-bottom:none}
.task-check{width:16px;height:16px;border:1.5px solid #d3d1c7;border-radius:4px;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:background 0.1s,border-color 0.1s}
.task-check.done{background:#1D9E75;border-color:#1D9E75}
.task-check.done::after{content:'✓';color:#fff;font-size:10px}
.task-body{flex:1;min-width:0}
.task-name{font-size:13px;color:#1a1a18;word-break:break-word}
.task-name.done-text{color:#b4b2a9;text-decoration:line-through}
.task-meta{display:flex;gap:8px;margin-top:3px;align-items:center;flex-wrap:wrap}
.task-dept{font-size:11px;color:#888780}
.task-due{font-size:11px;padding:1px 7px;border-radius:20px;font-weight:500}
.due-ok{background:#EAF3DE;color:#3B6D11}
.due-soon{background:#FAEEDA;color:#854F0B}
.due-late{background:#FCEBEB;color:#A32D2D}
.task-add-row{padding:1rem 1.25rem;border-top:0.5px solid #d3d1c7;background:#f9f8f5;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.task-add-row input,.task-add-row select{font-size:13px}
</style>
</head>
<body>
<div class="page">
  <h1>Project Tracker</h1>
  <p class="subtitle">All departments · updated weekly</p>

  <!-- Metrics -->
  <div class="metrics">
    <div class="metric"><div class="metric-label">Total</div><div class="metric-val mv-total" id="mTotal">0</div></div>
    <div class="metric"><div class="metric-label">On track</div><div class="metric-val mv-on" id="mOnTrack">0</div></div>
    <div class="metric"><div class="metric-label">At risk</div><div class="metric-val mv-risk" id="mAtRisk">0</div></div>
    <div class="metric"><div class="metric-label">Blocked</div><div class="metric-val mv-blocked" id="mBlocked">0</div></div>
    <div class="metric"><div class="metric-label">Complete</div><div class="metric-val mv-done" id="mDone">0</div></div>
  </div>

  <!-- Project Table -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">All projects</span>
      <div class="filters">
        <select id="fDept"><option value="">All departments</option></select>
        <select id="fStatus"><option value="">All statuses</option><option>On track</option><option>At risk</option><option>Blocked</option><option>Complete</option><option>Not started</option></select>
        <select id="fPri"><option value="">All priorities</option><option>High</option><option>Medium</option><option>Low</option></select>
      </div>
    </div>
    <table>
      <colgroup>
        <col class="col-dept"><col class="col-proj"><col class="col-own"><col class="col-stat"><col class="col-pri"><col class="col-prog"><col class="col-act">
      </colgroup>
      <thead><tr>
        <th>Department</th><th>Project</th><th>Owner</th><th>Status</th><th>Priority</th><th>Progress</th><th>Action</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="add-area">
      <input id="aDept" placeholder="Department" list="deptList" style="width:130px"/>
      <datalist id="deptList"></datalist>
      <input id="aProj" placeholder="Project name" style="flex:1;min-width:120px"/>
      <input id="aOwn" placeholder="Owner" style="width:110px"/>
      <select id="aStat"><option>On track</option><option>At risk</option><option>Blocked</option><option>Complete</option><option>Not started</option></select>
      <select id="aPri"><option>High</option><option>Medium</option><option>Low</option></select>
      <input id="aProg" type="number" placeholder="%" min="0" max="100" style="width:60px"/>
      <button class="btn btn-primary" onclick="addProject()">+ Add project</button>
    </div>
  </div>

  <!-- Weekly Dev Tasks -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Weekly dev tasks</span>
      <span style="font-size:12px;color:#888780" id="taskSummary"></span>
    </div>
    <div class="tasks-grid">
      <div class="tasks-col">
        <div class="tasks-col-title">&#9679; To do this week</div>
        <div id="tasksTodo"></div>
      </div>
      <div class="tasks-col">
        <div class="tasks-col-title">&#10003; Done</div>
        <div id="tasksDone"></div>
      </div>
    </div>
    <div class="task-add-row">
      <input id="tName" placeholder="Task description" style="flex:1;min-width:160px"/>
      <input id="tDept" placeholder="Assign to (team/person)" style="width:160px" list="deptList"/>
      <input id="tDue" type="date" style="width:140px"/>
      <button class="btn btn-primary" onclick="addTask()">+ Add task</button>
    </div>
  </div>
</div>

<script>
const STAT_BADGE={'On track':'b-green','At risk':'b-amber','Blocked':'b-red','Complete':'b-blue','Not started':'b-gray'};
const PRI_BADGE={'High':'b-red','Medium':'b-amber','Low':'b-green'};
const PROG_COLOR={'On track':'#1D9E75','At risk':'#EF9F27','Blocked':'#E24B4A','Complete':'#378ADD','Not started':'#B4B2A9'};

let projects=[
  {dept:'Marketing',proj:'Q3 Campaign',own:'Sara L.',status:'On track',pri:'High',prog:65},
  {dept:'Marketing',proj:'Brand Refresh',own:'Tom R.',status:'At risk',pri:'Medium',prog:30},
  {dept:'Engineering',proj:'API v2',own:'Priya K.',status:'On track',pri:'High',prog:80},
  {dept:'Engineering',proj:'Mobile App',own:'James T.',status:'Blocked',pri:'High',prog:45},
  {dept:'Engineering',proj:'Data Pipeline',own:'Nadia F.',status:'Not started',pri:'Medium',prog:0},
  {dept:'Product',proj:'Roadmap 2026',own:'Chen W.',status:'On track',pri:'High',prog:55},
  {dept:'Product',proj:'User Research',own:'Mia B.',status:'Complete',pri:'Low',prog:100},
  {dept:'HR',proj:'Onboarding Revamp',own:'Jake P.',status:'At risk',pri:'Medium',prog:40},
  {dept:'Finance',proj:'Budget Forecast',own:'Aisha M.',status:'On track',pri:'High',prog:70},
];

let tasks=[
  {name:'Fix auth bug on login page',dept:'Engineering',due:'2025-06-20',done:false},
  {name:'Deploy API v2 to staging',dept:'Engineering',due:'2025-06-18',done:false},
  {name:'Review mobile app PR #42',dept:'Engineering',due:'2025-06-19',done:false},
  {name:'Update data pipeline schema',dept:'Engineering',due:'2025-06-21',done:true},
];

function dueBadge(dateStr,done){
  if(done) return '';
  if(!dateStr) return '';
  const today=new Date(); today.setHours(0,0,0,0);
  const due=new Date(dateStr);
  const diff=Math.round((due-today)/(1000*60*60*24));
  if(diff<0) return `<span class="task-due due-late">Overdue</span>`;
  if(diff<=2) return `<span class="task-due due-soon">Due ${due.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>`;
  return `<span class="task-due due-ok">Due ${due.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>`;
}

function renderTasks(){
  const todo=tasks.filter(t=>!t.done);
  const done=tasks.filter(t=>t.done);
  function taskHTML(t,i){
    const idx=tasks.indexOf(t);
    return `<div class="task-item">
      <div class="task-check${t.done?' done':''}" onclick="toggleTask(${idx})" title="${t.done?'Mark incomplete':'Mark done'}"></div>
      <div class="task-body">
        <div class="task-name${t.done?' done-text':''}">${t.name}</div>
        <div class="task-meta">
          ${t.dept?`<span class="task-dept">${t.dept}</span>`:''}
          ${dueBadge(t.due,t.done)}
        </div>
      </div>
      <button class="del-btn" onclick="deleteTask(${idx})" title="Remove">&#10005;</button>
    </div>`;
  }
  document.getElementById('tasksTodo').innerHTML=todo.length?todo.map(taskHTML).join(''):'<div style="color:#b4b2a9;font-size:13px;padding:10px 0">No tasks yet — add one below.</div>';
  document.getElementById('tasksDone').innerHTML=done.length?done.map(taskHTML).join(''):'<div style="color:#b4b2a9;font-size:13px;padding:10px 0">Completed tasks will appear here.</div>';
  document.getElementById('taskSummary').textContent=`${todo.length} pending · ${done.length} done`;
}

function toggleTask(i){tasks[i].done=!tasks[i].done;renderTasks();}
function deleteTask(i){tasks.splice(i,1);renderTasks();}
function addTask(){
  const name=document.getElementById('tName').value.trim();
  if(!name)return;
  tasks.unshift({name,dept:document.getElementById('tDept').value.trim(),due:document.getElementById('tDue').value,done:false});
  document.getElementById('tName').value='';
  document.getElementById('tDept').value='';
  document.getElementById('tDue').value='';
  renderTasks();
}

function renderProjects(){
  const deptF=document.getElementById('fDept').value;
  const statF=document.getElementById('fStatus').value;
  const priF=document.getElementById('fPri').value;
  const filtered=projects.filter(p=>(!deptF||p.dept===deptF)&&(!statF||p.status===statF)&&(!priF||p.pri===priF));
  document.getElementById('tbody').innerHTML=filtered.map(p=>{
    const idx=projects.indexOf(p);
    const pct=Math.min(100,Math.max(0,p.prog||0));
    const pc=PROG_COLOR[p.status]||'#888';
    return `<tr>
      <td title="${p.dept}">${p.dept}</td>
      <td title="${p.proj}">${p.proj}</td>
      <td title="${p.own}">${p.own}</td>
      <td><span class="badge ${STAT_BADGE[p.status]||'b-gray'}">${p.status}</span></td>
      <td><span class="badge ${PRI_BADGE[p.pri]||'b-gray'}">${p.pri}</span></td>
      <td><div style="display:flex;align-items:center;gap:6px"><div class="prog-wrap"><div class="prog-bar" style="width:${pct}%;background:${pc}"></div></div><span style="font-size:11px;color:#888780;min-width:28px">${pct}%</span></div></td>
      <td><button class="del-btn" onclick="delProject(${idx})" title="Remove">&#10005;</button></td>
    </tr>`;
  }).join('');
  document.getElementById('mTotal').textContent=projects.length;
  document.getElementById('mOnTrack').textContent=projects.filter(p=>p.status==='On track').length;
  document.getElementById('mAtRisk').textContent=projects.filter(p=>p.status==='At risk').length;
  document.getElementById('mBlocked').textContent=projects.filter(p=>p.status==='Blocked').length;
  document.getElementById('mDone').textContent=projects.filter(p=>p.status==='Complete').length;
  const depts=[...new Set(projects.map(p=>p.dept))].sort();
  const fd=document.getElementById('fDept');const cv=fd.value;
  fd.innerHTML='<option value="">All departments</option>'+depts.map(d=>`<option${d===cv?' selected':''}>${d}</option>`).join('');
  document.getElementById('deptList').innerHTML=depts.map(d=>`<option value="${d}">`).join('');
}

function delProject(i){projects.splice(i,1);renderProjects();}
function addProject(){
  const dept=document.getElementById('aDept').value.trim();
  const proj=document.getElementById('aProj').value.trim();
  if(!dept||!proj)return;
  projects.push({dept,proj,own:document.getElementById('aOwn').value.trim(),status:document.getElementById('aStat').value,pri:document.getElementById('aPri').value,prog:parseInt(document.getElementById('aProg').value)||0});
  document.getElementById('aDept').value='';document.getElementById('aProj').value='';document.getElementById('aOwn').value='';document.getElementById('aProg').value='';
  renderProjects();
}

['fDept','fStatus','fPri'].forEach(id=>document.getElementById(id).addEventListener('change',renderProjects));
renderProjects();
renderTasks();
</script>
</body>
</html>
